[package]
name = "linux-tpm-fido2"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
base64 = "0.22.1"
ciborium = "0.2.2"
clap = { version = "4.5.53", features = ["derive"] }
color-eyre = "0.6.5"
env_logger = "0.11.8"
getrandom = "0.4.3"
log = "0.4.27"
p256 = { version = "0.14", features = ["ecdsa"] }
rcgen = { version = "0.14.8", features = ["ring"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11"
uhid-virt = "0.0.8"
